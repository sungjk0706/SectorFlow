[pytest]
asyncio_mode = auto
# 운영은 단일 asyncio 루프이므로 테스트도 단일 세션 루프를 공유한다(원칙 9: 테스트=운영 동일 조건).
# 이로써 모듈 전역 asyncio.Lock / 단일 DB 커넥션이 여러 루프에 묶여 교착되는 것을 방지.
asyncio_default_test_loop_scope = session
asyncio_default_fixture_loop_scope = session
filterwarnings =
    error::RuntimeWarning
testpaths = backend/tests
pythonpath = .
